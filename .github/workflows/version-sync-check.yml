name: version-sync-check

# Vérifie sur chaque PR que `core/__version__.py` reste cohérent avec la
# première section versionnée du CHANGELOG. Évite de tagger une version
# désynchronisée — voir la mémoire `gungnir-release-changelog-gotcha` :
# le tag déclenche `release.yml`, et une désynchro à ce moment-là sort
# une release sans notes.

on:
  pull_request:
    paths:
      - "core/__version__.py"
      - "CHANGELOG.md"
      - "scripts/check_version_sync.py"
      - ".github/workflows/version-sync-check.yml"
  push:
    branches: [main]
    paths:
      - "core/__version__.py"
      - "CHANGELOG.md"

concurrency:
  group: version-sync-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    name: check version ↔ changelog
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run check_version_sync.py
        run: python scripts/check_version_sync.py
